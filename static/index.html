<script>
const api = async (path, opts = {}) => {
  const r = await fetch(path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!r.ok) {
    let detail;
    try { detail = await r.json(); } catch { detail = await r.text(); }
    throw { status: r.status, detail };
  }
  return r.json();
};

const state = {
  me: null,
  insights: null,
  whitelist: [],
  selectedTab: "non_followers",
  selectedIds: new Set(),
  job: null,
  jobPoll: null,
  speed: "safe",
  search: "",
  insightsLoading: false,
  insightsCachedAt: 0,
  insightsProgress: null,
  filters: new Set(),
};

// List filter chips. Active chips combine with AND. (_followerPks/_followingPks
// are filled in listView before filtering so the mutual tests work.)
const FILTERS = {
  hidden:      { label: "Story hidden",  test: u => u.story_hidden },
  not_hidden:  { label: "Not hidden",    test: u => !u.story_hidden },
  mutual:      { label: "Mutual",        test: u => state._followerPks.has(u.pk) && state._followingPks.has(u.pk) },
  not_mutual:  { label: "Not mutual",    test: u => !(state._followerPks.has(u.pk) && state._followingPks.has(u.pk)) },
  private:     { label: "Private",       test: u => u.is_private },
  public:      { label: "Public",        test: u => !u.is_private },
  verified:    { label: "Verified",      test: u => u.is_verified },
  no_avatar:   { label: "No photo",      test: u => !u.profile_pic_url },
  no_name:     { label: "No name",       test: u => !u.full_name },
  whitelisted: { label: "Whitelisted",   test: u => state.whitelist.includes(u.username.toLowerCase()) },
};

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

// 👉 Set your donation link here. India-friendly options:
//   • Razorpay Payment Page: https://rzp.io/l/yourpage
//   • Instamojo: https://www.instamojo.com/@yourname
//   • UPI: a UPI deep link or a page with your UPI ID / QR
const DONATE_URL = "https://rzp.io/l/your-payment-page";

// IG CDN blocks hotlinked images from localhost, so route them through our proxy.
function imgSrc(url) {
  return url ? `/api/img?url=${encodeURIComponent(url)}` : "";
}

function relTime(ts) {
  if (!ts) return "";
  const s = Math.floor(Date.now() / 1000 - ts);
  if (s < 60) return "just now";
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}

// Speed tiers -> [min_delay, max_delay] seconds between actions.
// "safe" is the only one that respects IG's anti-spam comfortably. The faster
// tiers carry real action-block / account-disable risk — that's IG, not us.
const SPEEDS = {
  safe:     { label: "Safe (45–90s) — recommended", min: 45, max: 90 },
  fast:     { label: "Fast (3–8s) — risky",         min: 3,  max: 8 },
  reckless: { label: "Reckless (1–2s) — may get you banned", min: 1, max: 2 },
  max:      { label: "Max (0s, parallel) — WILL likely get blocked", min: 0, max: 0, parallel: 8 },
};

// Desktop notification on job done/fail (#3). Falls back silently if denied.
function ensureNotifyPermission() {
  if (typeof Notification === "undefined") return;
  if (Notification.permission === "default") Notification.requestPermission();
}
function notify(title, body) {
  try {
    if (typeof Notification !== "undefined" && Notification.permission === "granted") {
      new Notification(title, { body });
      return;
    }
  } catch {}
  // Fallback: in-page toast.
  toast(`${title} — ${body}`);
}
function toast(text) {
  const t = document.createElement("div");
  t.className = "fixed top-4 right-4 z-50 bg-slate-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg";
  t.textContent = text;
  document.body.append(t);
  setTimeout(() => t.remove(), 5000);
}
function notifyJobEnd(job) {
  const r = job.result || {};
  const ok = r.ok?.length || 0, failed = r.failed?.length || 0, skipped = r.skipped?.length || 0;
  if (job.status === "error") notify("Job failed", r.error || "unknown error");
  else if (job.status === "stopped") notify("Job stopped", `ok ${ok} · failed ${failed} · skipped ${skipped}`);
  else notify("Job done", `${job.action}: ok ${ok} · failed ${failed} · skipped ${skipped}`);
}

function render() {
  const root = document.getElementById("app");
  if (!state.me) return root.replaceChildren(loginView());
  root.replaceChildren(dashboardView());
}

      else if (d?.kind === "challenge") errEl.textContent = d.message;
      else errEl.textContent = d?.message || JSON.stringify(d);
    }
  };
  return wrap;
}

// ---------- dashboard ----------
// Whitelist is cheap; insights (full follower + following pull) can take minutes
// on large accounts, so it loads in the background and re-renders when ready.
async function loadAll() {
  state.insightsError = null;
  try { state.whitelist = (await api("/api/whitelist")).usernames; } catch {}
  render();
  await refreshInsights(false);
}

async function refreshInsights(force) {
  state.insightsError = null;
  try {
    let data = await api(`/api/insights${force ? "?refresh=true" : ""}`);

    if (data && data.building) {
      // First-ever load, no cache yet — show the progress screen.
      state.insightsLoading = true;
      state.insightsProgress = null;
      render();
      while (data && data.building) {
        await sleep(700);
        const p = await api("/api/insights/progress");
        state.insightsProgress = p;
        render();
        if (p.status === "error") throw { detail: { detail: { message: p.error || "build failed" } } };
        if (p.status === "done") data = await api("/api/insights");
      }
    }

    // We have data — show it immediately, even if a refresh is running behind it.
    state.insights = data;
    state.insightsCachedAt = data.cached_at || (Date.now() / 1000);
    state.insightsLoading = false;
    state.insightsProgress = null;
    state.insightsRefreshing = !!data.refreshing;
    render();

    // If a background refresh is in flight, poll quietly and swap in fresh data
    // when it lands — the dashboard stays usable the whole time.
    if (data.refreshing) pollBackgroundRefresh();
  } catch (e) {
    state.insightsError = e.detail?.detail?.message || e.detail?.detail || "failed to load insights";
    state.insightsLoading = false;
    render();
  }
}

async function pollBackgroundRefresh() {
  if (state._bgPolling) return;
  state._bgPolling = true;
  try {
    while (true) {
      await sleep(2500);
      let p;
      try { p = await api("/api/insights/progress"); } catch { continue; }
      if (p.status === "done") {
        const fresh = await api("/api/insights");
        state.insights = fresh;
        state.insightsCachedAt = fresh.cached_at || (Date.now() / 1000);
        state.insightsRefreshing = false;
        render();
        break;
      }
      if (p.status === "error") { state.insightsRefreshing = false; render(); break; }
    }
  } finally {
    state._bgPolling = false;
  }
}

// ---------- hide/unhide story from ALL followers ----------
function speedSelect() {
  const sel = document.createElement("select");
  sel.className = "border rounded px-2 py-2 text-sm bg-white";
  for (const [key, s] of Object.entries(SPEEDS)) {
    const o = document.createElement("option");
    o.value = key; o.textContent = s.label; o.selected = state.speed === key;
    sel.append(o);
  }
  sel.onchange = (e) => { state.speed = e.target.value; render(); };
  return sel;
}

      <span>⚠</span><span>Faster than Safe risks an Instagram action-block or permanent account disable. 1000 actions can't finish in under ~20 min at any safe rate — that limit is Instagram's, not this tool's.</span>

  `;
  el.querySelector("#speedSlot").replaceWith(speedSelect());
  el.querySelector("#hideAll").onclick = () => runBulkAllFollowers("hide_story");

async function runBulkAllFollowers(action) {
  const verb = action === "hide_story" ? "Hide" : "Unhide";
  let ids, hidden_ids;
  try {
    const r = await api("/api/followers/ids");
    ids = r.ids; hidden_ids = new Set(r.hidden_ids || []);
  } catch (e) {
    alert("Couldn't load follower list: " + (e.detail?.detail?.message || JSON.stringify(e.detail)));
    return;
  }
  // Only act on people whose state actually changes.
  let targets;
  if (action === "hide_story") targets = ids.filter(id => !hidden_ids.has(id));
  else targets = ids.filter(id => hidden_ids.has(id));

  if (!targets.length) {
    alert(action === "hide_story" ? "Everyone is already hidden." : "Nobody is currently hidden.");
    return;
  }
  const s = SPEEDS[state.speed];
  const mins = Math.round(targets.length * (s.min + s.max) / 2 / 60);
  const msg = `${verb} story for ${targets.length} follower(s)?\n\n` +
    `Speed: ${s.label}\nEstimated time: ~${mins} min\n` +
    `${state.speed !== "safe" ? "\n⚠ Faster than Safe risks an action-block or account disable.\n" : ""}` +
    `Whitelist skipped automatically.`;
  if (!confirm(msg)) return;
  runBulk(action, targets, { min_delay: s.min, max_delay: s.max, skipConfirm: true });
}

function tabsView() {
  const el = document.createElement("div");
  el.className = "flex gap-2 mb-3 overflow-x-auto pb-1";
  const tabs = [
    ["followers", `Followers (${state.insights.followers.length})`],
    ["following", `Following (${state.insights.following.length})`],
    ["non_followers", `Doesn't follow back (${state.insights.non_followers.length})`],
    ["fans", `You don't follow back (${state.insights.fans.length})`],
  ];
  for (const [key, label] of tabs) {
    const b = document.createElement("button");
    b.className = `px-3 py-1.5 rounded-full text-sm whitespace-nowrap transition ${state.selectedTab === key ? "bg-indigo-600 text-white shadow-sm" : "bg-white ring-1 ring-slate-200 hover:bg-slate-50"}`;
    b.textContent = label;
    b.onclick = () => { state.selectedTab = key; state.selectedIds = new Set(); state.search = ""; state._listScroll = 0; render(); };
    el.append(b);
  }
  return el;
}

function listView() {
  const all = state.insights[state.selectedTab];
  // Sets used by the mutual filters.
  state._followerPks = new Set(state.insights.followers.map(u => u.pk));
  state._followingPks = new Set(state.insights.following.map(u => u.pk));
  const q = state.search.trim().toLowerCase();
  const active = [...state.filters];
  const items = all.filter(u => {
    if (q && !u.username.toLowerCase().includes(q) && !(u.full_name || "").toLowerCase().includes(q)) return false;
    return active.every(f => FILTERS[f].test(u));
  });

  const wrap = document.createElement("div");
  wrap.className = "bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 mb-3 overflow-hidden";

  // search box
  const searchRow = document.createElement("div");
  searchRow.className = "p-3 border-b";
  searchRow.innerHTML = `<input id="search" type="text" placeholder="Search ${all.length} by username or name…"
    class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" value="${state.search.replace(/"/g, "&quot;")}" />`;
  const si = searchRow.querySelector("#search");
  si.oninput = (e) => {
    state.search = e.target.value;
    render();
    const again = document.getElementById("search");
    if (again) { again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
  };
  wrap.append(searchRow);

  // filter chips
  const filterRow = document.createElement("div");
  filterRow.className = "px-3 py-2 border-b flex items-center gap-2 flex-wrap";
  for (const [key, f] of Object.entries(FILTERS)) {
    const on = state.filters.has(key);
    const count = all.filter(u => FILTERS[key].test(u)).length;
    const chip = document.createElement("button");
    chip.className = `px-2.5 py-1 rounded-full text-xs font-medium transition ${on ? "bg-indigo-600 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`;
    chip.textContent = `${f.label} (${count})`;
    chip.onclick = () => {
      if (on) state.filters.delete(key); else state.filters.add(key);
      state._listScroll = 0;
      render();
    };
    filterRow.append(chip);
  }
  if (active.length) {
    const clear = document.createElement("button");
    clear.className = "px-2.5 py-1 rounded-full text-xs font-medium text-red-600 hover:bg-red-50 ml-auto";
    clear.textContent = "Clear filters";
    clear.onclick = () => { state.filters.clear(); state._listScroll = 0; render(); };
    filterRow.append(clear);
  }
  wrap.append(filterRow);

  const el = document.createElement("div");
  el.id = "listscroll";
  el.className = "max-h-96 overflow-auto divide-y";
  // Remember scroll position so toggling a checkbox (which re-renders) doesn't
  // jump the list back to the top.
  el.onscroll = () => { state._listScroll = el.scrollTop; };
  requestAnimationFrame(() => {
    const live = document.getElementById("listscroll");
    if (live && state._listScroll) live.scrollTop = state._listScroll;
  });

  // select-all row (acts on the currently filtered set)
  const head = document.createElement("div");
  head.className = "flex items-center gap-3 p-3 bg-slate-50 sticky top-0 text-sm z-10";
  head.innerHTML = `<input type="checkbox" id="sa" /> <span>Select all${(q || active.length) ? " filtered" : ""} (${items.length})</span>
    <span class="ml-auto text-slate-500">${state.selectedIds.size} selected</span>`;
  head.querySelector("#sa").checked = items.length > 0 && items.every(u => state.selectedIds.has(u.pk));
  head.querySelector("#sa").onchange = (e) => {
    if (e.target.checked) items.forEach(u => state.selectedIds.add(u.pk));
    else items.forEach(u => state.selectedIds.delete(u.pk));
    render();
  };
  el.append(head);

  if (!items.length) {
    const empty = document.createElement("div");
    empty.className = "p-6 text-center text-sm text-slate-400";
    empty.textContent = q ? "No matches." : "Nobody here.";
    el.append(empty);
  }

  for (const u of items) {
    const selected = state.selectedIds.has(u.pk);
    const profile = `https://www.instagram.com/${u.username}/`;
    const row = document.createElement("div");
    row.className = `flex items-center gap-3 px-3 py-2.5 cursor-pointer transition ${selected ? "bg-indigo-50/60" : "hover:bg-slate-50"}`;
    row.innerHTML = `
      <input type="checkbox" class="w-4 h-4 accent-indigo-600 shrink-0" data-pk="${u.pk}" ${selected ? "checked" : ""} />
      <a href="${profile}" target="_blank" rel="noopener" class="shrink-0" title="Open @${u.username} on Instagram">
        ${u.profile_pic_url
          ? `<img src="${imgSrc(u.profile_pic_url)}" loading="lazy" class="w-9 h-9 rounded-full object-cover bg-slate-200 ring-1 ring-slate-200" onerror="this.style.visibility='hidden'" />`
          : `<div class="w-9 h-9 rounded-full bg-slate-200 grid place-items-center text-xs text-slate-500">${(u.username[0] || "?").toUpperCase()}</div>`}
      </a>
      <div class="flex-1 min-w-0">
        <div class="text-sm flex items-center gap-1 flex-wrap">
          <a href="${profile}" target="_blank" rel="noopener" class="font-medium text-slate-900 hover:text-indigo-600 hover:underline truncate">@${u.username}</a>
          ${u.is_verified ? '<span class="pill bg-blue-100 text-blue-700">verified</span>' : ""}
          ${u.is_private ? '<span class="pill bg-slate-100 text-slate-600">private</span>' : ""}
          ${state.whitelist.includes(u.username.toLowerCase()) ? '<span class="pill bg-amber-100 text-amber-700">whitelisted</span>' : ""}
          ${u.story_hidden ? '<span class="pill bg-indigo-100 text-indigo-700">story hidden</span>' : ""}
        </div>
        ${u.full_name ? `<div class="text-xs text-slate-500 truncate">${u.full_name}</div>` : ""}
      </div>
      <a href="${profile}" target="_blank" rel="noopener" class="shrink-0 text-slate-300 hover:text-indigo-600 px-1" title="Open profile" onclick="event.stopPropagation()">↗</a>
    `;
    const cb = row.querySelector("input");
    const toggle = () => {
      if (state.selectedIds.has(u.pk)) state.selectedIds.delete(u.pk);
      else state.selectedIds.add(u.pk);
      render();
    };
    cb.onclick = (e) => { e.stopPropagation(); toggle(); };
    // Click anywhere on the row toggles, EXCEPT on the profile links.
    row.onclick = (e) => { if (e.target.closest("a")) return; toggle(); };
    el.append(row);
  }
  wrap.append(el);
  return wrap;
}

function actionBar() {
  const el = document.createElement("div");
  el.className = "bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 p-4 mb-6";
  const tab = state.selectedTab;
  const allItems = state.insights[tab];
  const allIds = allItems.map(u => u.pk);
  const ids = state.selectedIds.size ? [...state.selectedIds] : [];
  const hiddenById = new Map(allItems.map(u => [u.pk, !!u.story_hidden]));

  // hide_story only matters for people NOT already hidden; unhide_story only for
  // people who ARE hidden. Filtering avoids running thousands of no-op actions
  // (the "I clicked unhide and nothing happened" trap) and explains why.
  const refineStory = (action, list) => {
    if (action === "hide_story") return list.filter(id => !hiddenById.get(id));
    if (action === "unhide_story") return list.filter(id => hiddenById.get(id));
    return list;
  };
  const runStoryAware = (action, list) => {
    // hide: skip people already hidden (safe, avoids redundant actions).
    // unhide: NEVER skip — unblocking a non-hidden user is harmless, and the
    // hidden-detection can be incomplete, so blocking would break the button.
    if (action === "unhide_story") {
      runBulk(action, list);
      return;
    }
    const targets = refineStory(action, list);
    if (!targets.length) {
      alert("These are all already hidden — nothing to do.");
      return;
    }
    const noop = list.length - targets.length;
    runBulk(action, targets, noop ? { note: `${noop} already hidden — skipped` } : {});
  };

  const button = (label, action, danger = false) => {
    const b = document.createElement("button");
    b.className = `px-3 py-2 rounded text-sm font-medium ${danger ? "bg-red-600 text-white hover:bg-red-700" : "bg-slate-900 text-white hover:bg-slate-800"} disabled:opacity-50`;
    b.textContent = label;
    b.disabled = ids.length === 0;
    b.onclick = () => runStoryAware(action, ids);
    return b;
  };

  const allButton = (label, action, list) => {
    const b = document.createElement("button");
    b.className = "px-3 py-2 rounded text-sm font-medium bg-slate-100 hover:bg-slate-200";
    b.textContent = label;
    b.onclick = () => runStoryAware(action, list);
    return b;
  };

  const headRow = document.createElement("div");
  headRow.className = "flex items-center justify-between gap-2 mb-3 flex-wrap";
  headRow.innerHTML = `<div class="text-sm font-medium">Actions on selection (${ids.length})</div>
    <div class="flex items-center gap-2"><span class="text-xs font-medium text-slate-500">Speed</span><span id="abSpeed"></span></div>`;
  headRow.querySelector("#abSpeed").replaceWith(speedSelect());
  el.append(headRow);
  const row1 = document.createElement("div");
  row1.className = "flex flex-wrap gap-2 mb-3";
  // "following" + "non_followers" are accounts you follow -> offer Unfollow.
  // "fans" are accounts you don't follow -> offer Follow back.
  // "followers" is mixed, so offer both.
  if (tab === "non_followers" || tab === "following") {
    row1.append(button("Unfollow selected", "unfollow", true));
  } else if (tab === "fans") {
    row1.append(button("Follow back selected", "follow"));
  } else { // followers
    row1.append(button("Follow back selected", "follow"));
    row1.append(button("Unfollow selected", "unfollow", true));
  }
  row1.append(button("Hide story from selected", "hide_story"));
  row1.append(button("Unhide story for selected", "unhide_story"));
  row1.append(button("Block selected", "block", true));
  row1.append(button("Unblock selected", "unblock"));
  el.append(row1);

  const row2 = document.createElement("div");
  row2.className = "flex flex-wrap gap-2 pt-3 border-t";
  row2.innerHTML = `<div class="text-xs text-slate-500 w-full">Or apply to ALL ${state.insights[tab].length} in current list:</div>`;
  row2.append(allButton(`Hide story from all`, "hide_story", allIds));
  row2.append(allButton(`Unhide story for all`, "unhide_story", allIds));
  el.append(row2);

  return el;
}

function whitelistView() {
  const el = document.createElement("div");
  el.className = "bg-white rounded-2xl shadow-sm ring-1 ring-slate-900/5 p-4 mb-6";
  el.innerHTML = `
    <div class="text-sm font-medium mb-2">Whitelist (never act on these usernames)</div>
    <textarea id="wl" rows="3" class="w-full border rounded p-2 text-sm font-mono" placeholder="one username per line">${state.whitelist.join("\n")}</textarea>
    <button id="save" class="mt-2 px-3 py-1.5 bg-slate-900 text-white rounded text-sm">Save</button>
    <span id="saved" class="ml-3 text-sm text-green-600 hidden">Saved</span>
  `;
  el.querySelector("#save").onclick = async () => {
    const list = el.querySelector("#wl").value.split("\n").map(s => s.trim()).filter(Boolean);
    const r = await api("/api/whitelist", { method: "PUT", body: { usernames: list } });
    state.whitelist = r.usernames;
    el.querySelector("#saved").classList.remove("hidden");
    setTimeout(() => el.querySelector("#saved").classList.add("hidden"), 1500);
  };
  return el;
}

function jobView() {
  const el = document.createElement("div");
  if (!state.job) return el;
  el.className = "fixed bottom-4 right-4 bg-white shadow-2xl ring-1 ring-slate-900/10 rounded-2xl p-4 w-96 max-w-[90vw]";
  const j = state.job;
  const pct = j.total ? Math.round(100 * j.done / j.total) : 0;
  const running = j.status === "running";
  const statusColor = { running: "bg-indigo-500", done: "bg-emerald-500", stopped: "bg-amber-500", stop_requested: "bg-amber-500", error: "bg-red-500" }[j.status] || "bg-slate-400";
  const evColor = (s) => ({ ok: "text-emerald-600", skipped: "text-slate-400", failed: "text-red-600", rate_limited: "text-amber-600" }[s] || "text-slate-500");
  el.innerHTML = `
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2 text-sm font-semibold">
        <span class="inline-block w-2 h-2 rounded-full ${statusColor} ${running ? "animate-pulse" : ""}"></span>
        ${j.action.replace("_", " ")} — ${j.status.replace("_", " ")}
      </div>
      <div class="flex items-center gap-2">
        ${running ? `<button id="stop" class="text-amber-600 hover:text-amber-700 text-xs font-medium">Stop</button>` : ""}
        <button id="close" class="text-slate-400 hover:text-slate-900 text-sm">✕</button>
      </div>
    </div>
    <div class="text-xs text-slate-500 mb-2">${j.done}/${j.total} · ${pct}% ${j.current ? "· now @" + j.current : ""}</div>
    <div class="h-2 bg-slate-200 rounded-full overflow-hidden mb-2">
      <div class="h-full ${statusColor} transition-all duration-500" style="width:${pct}%"></div>
    </div>
    <div class="max-h-32 overflow-auto text-xs font-mono space-y-0.5">
      ${(j.events || []).slice().reverse().map(e => `<div class="truncate ${evColor(e.status)}">${e.status} @${e.username || ""}</div>`).join("")}
    </div>
    ${j.result ? `<div class="text-xs mt-2 flex gap-3"><span class="text-emerald-600">ok ${j.result.ok?.length || 0}</span><span class="text-slate-400">skip ${j.result.skipped?.length || 0}</span><span class="text-red-600">fail ${j.result.failed?.length || 0}</span></div>` : ""}
  `;
  const stopBtn = el.querySelector("#stop");
  if (stopBtn) stopBtn.onclick = async () => {
    try { await api(`/api/job/${j.id}/stop`, { method: "POST" }); } catch {}
  };
  el.querySelector("#close").onclick = () => {
    if (state.jobPoll) clearInterval(state.jobPoll);
    state.job = null; state.jobPoll = null; render();
  };
  return el;
}

async function runBulk(action, user_ids, opts = {}) {
  if (!user_ids.length) return;
  const { skipConfirm, note } = opts;
  // Every action honors the global Speed selector unless a caller overrides it.
  const s = SPEEDS[state.speed] || SPEEDS.safe;
  const min_delay = opts.min_delay != null ? opts.min_delay : s.min;
  const max_delay = opts.max_delay != null ? opts.max_delay : s.max;
  const concurrency = s.parallel || 1;
  const risky = state.speed !== "safe" && (action === "unfollow" || action === "follow" || action === "block");
  if (!skipConfirm) {
    const pace = concurrency > 1 ? `${concurrency} in parallel, no delay` : `${min_delay}-${max_delay}s between actions`;
    const msg = `${action.replace("_", " ")} ${user_ids.length} user(s)?\n` +
      `${note ? "(" + note + ")\n" : ""}` +
      `\nSpeed: ${s.label}\nPace: ${pace}.\n` +
      `${concurrency > 1 ? "\n⚠ Max mode hammers Instagram with no pacing. It WILL likely hit a rate-limit / action-block partway through and may disable the account. Expect it to stop early.\n" : ""}` +
      `${risky && concurrency === 1 ? "\n⚠ Fast follow/unfollow/block is the #1 cause of action-blocks. Safe speed strongly recommended for these.\n" : ""}` +
      `Whitelist will be skipped automatically.`;
    if (!confirm(msg)) return;
  }
  ensureNotifyPermission();
  const body = { action, user_ids, min_delay, max_delay, concurrency };
  let r;
  try {
    r = await api("/api/bulk", { method: "POST", body });
  } catch (e) {
    const d = e.detail?.detail || e.detail;
    alert(`Couldn't start ${action.replace("_", " ")}:\n\n${d?.message || (typeof d === "string" ? d : JSON.stringify(d)) || "server error"}`);
    return;
  }
  toast(`Started: ${action.replace("_", " ")} on ${user_ids.length} — see panel, bottom-right`);
  state.job = { id: r.job_id, action, total: user_ids.length, done: 0, status: "running", events: [] };
  if (state.jobPoll) clearInterval(state.jobPoll);
  state.jobPoll = setInterval(async () => {
    try {
      const job = await api(`/api/job/${r.job_id}`);
      state.job = job;
      if (["done", "stopped", "error"].includes(job.status)) {
        clearInterval(state.jobPoll);
        state.jobPoll = null;
        notifyJobEnd(job);               // desktop notification (#3)
        // refresh insights after the job ends
        try { state.insights = await api("/api/insights"); } catch {}
      }
      render();
    } catch (e) { /* ignore transient */ }
  }, 2000);
  render();
}

// ---------- boot ----------
(async () => {
  ensureNotifyPermission();
  // Session restore runs in a background thread on the server and may take a
  // moment, so retry /api/me a few times before falling back to the login view.
  for (let i = 0; i < 6; i++) {
    try {
      state.me = await api("/api/me");
      render();        // dashboard shell now
      loadAll();       // insights load (cached = instant)
      return;
    } catch (e) {
      if (i === 5) break;
      await sleep(600);
    }
  }
  render();            // not logged in -> login view
})();
</script>
</body>
</html>
